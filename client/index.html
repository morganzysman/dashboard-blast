<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OlaClick Analytics Dashboard</title>
    
    <!-- Cache Control - Prevent Caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Real-time analytics dashboard for OlaClick restaurant accounts with user management">
    <meta name="theme-color" content="#006FFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="OlaClick Analytics">
    <meta name="msapplication-TileColor" content="#006FFF">
    <meta name="msapplication-config" content="/browserconfig.xml">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#3b82f6">
    
    <!-- Fonts (OlaClick Design System: Roboto + Poppins display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <!-- Iconography: Material Symbols Rounded -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..24,400..500,0..1,0" />

    <!-- Preload service worker -->
    <link rel="preload" href="/sw.js" as="script">

    <!-- Theme init (avoid FOUC): set [data-theme] before first paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        } catch (e) {}
      })();
    </script>
</head>
<body class="font-sans">
    <div id="app" class="min-h-screen">
        <!-- Vue.js app will mount here -->
        <div class="flex items-center justify-center min-h-screen" style="background: #F5F6F8;">
            <div class="text-center p-8" style="background: #FFFFFF; border: 1px solid #EBEBEB; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <div class="animate-spin rounded-full h-16 w-16 mx-auto" style="border: 2px solid #EBEBEB; border-bottom-color: #006FFF;"></div>
                <p class="mt-4" style="color: #6B7280;">Cargando OlaClick Analytics…</p>
            </div>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
